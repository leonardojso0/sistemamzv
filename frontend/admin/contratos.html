<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contratos — NEXUS CONECTA</title>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<template id="page-body">
  <div class="page-header">
    <h2>Contratos</h2>
    <button class="btn" id="btnNovo">+ Novo contrato</button>
  </div>

  <div id="alertBox"></div>

  <div class="card" id="formCard" style="display:none;">
    <h3>Novo contrato</h3>
    <form id="contratoForm" class="form-grid cols-2">
      <div class="field">
        <label>Cliente</label>
        <select id="clienteId" required><option value="">Selecione...</option></select>
      </div>
      <div class="field">
        <label>Plano</label>
        <select id="planoId" required><option value="">Selecione...</option></select>
      </div>
      <div class="field"><label>Valor de implantação (R$)</label><input id="valorImplantacao" type="number" step="0.01" min="0" value="0" /></div>
      <div class="field"><label>Data de assinatura</label><input id="dataAssinatura" type="date" /></div>
      <div class="field"><label>Início da vigência</label><input id="dataInicio" type="date" /></div>
      <div class="field"><label>Término da vigência</label><input id="dataTermino" type="date" /></div>
      <div class="field"><label>Dia de vencimento padrão</label><input id="diaVencimento" type="number" min="1" max="31" placeholder="Ex: 5" /></div>
      <div class="field" style="grid-column: 1 / -1;">
        <div class="flex-between">
          <button type="button" class="btn btn-ghost" id="btnCancelar">Cancelar</button>
          <button type="submit" class="btn" id="btnSalvar">Salvar</button>
        </div>
      </div>
    </form>
  </div>

  <div class="card table-wrap">
    <table>
      <thead><tr><th>Cliente</th><th>Plano</th><th>Status</th><th>Vigência</th><th>Vencimento</th><th></th></tr></thead>
      <tbody id="tabelaContratos"><tr><td colspan="6">Carregando...</td></tr></tbody>
    </table>
  </div>
</template>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/admin-nav.js"></script>
<script>
  requireAdminAuth();
  renderAdminNav("contratos");

  const alertBox = document.getElementById("alertBox");

  const badgeStatusContrato = (status) => {
    const mapa = { ATIVO: "badge-success", SUSPENSO: "badge-warning", CANCELADO: "badge-muted" };
    return `<span class="badge ${mapa[status] || "badge-muted"}">${status}</span>`;
  };

  async function carregarSelects() {
    const [clientes, planos] = await Promise.all([adminApi("/clientes"), adminApi("/planos")]);
    const selectCliente = document.getElementById("clienteId");
    clientes.forEach((c) => selectCliente.insertAdjacentHTML("beforeend", `<option value="${c.id}">${c.nome} (${c.cpfCnpj})</option>`));
    const selectPlano = document.getElementById("planoId");
    planos.forEach((p) => selectPlano.insertAdjacentHTML("beforeend", `<option value="${p.id}">${p.nome} - ${p.velocidade}</option>`));
  }

  async function carregarTabela() {
    const contratos = await adminApi("/contratos");
    const tbody = document.getElementById("tabelaContratos");
    tbody.innerHTML = contratos.length
      ? contratos
          .map(
            (c) => `
      <tr>
        <td data-label="Cliente"><a href="cliente-detalhe.html?id=${c.cliente.id}">${c.cliente.nome}</a></td>
        <td data-label="Plano">${c.plano.nome} (${c.plano.velocidade})</td>
        <td data-label="Status">${badgeStatusContrato(c.status)}</td>
        <td data-label="Vigência">${c.dataInicio ? formatData(c.dataInicio) : "-"} a ${c.dataTermino ? formatData(c.dataTermino) : "-"}</td>
        <td data-label="Vencimento">${c.diaVencimento ? `Dia ${c.diaVencimento}` : "-"}</td>
        <td data-label="">
          ${
            c.status === "ATIVO"
              ? `<button class="btn btn-ghost" data-status="${c.id}:SUSPENSO">Suspender</button>
                 <button class="btn btn-danger" data-status="${c.id}:CANCELADO">Cancelar</button>`
              : c.status === "SUSPENSO"
              ? `<button class="btn btn-ghost" data-status="${c.id}:ATIVO">Reativar</button>`
              : ""
          }
        </td>
      </tr>`
          )
          .join("")
      : `<tr><td colspan="6"><div class="empty-state">Nenhum contrato cadastrado.</div></td></tr>`;

    document.querySelectorAll("[data-status]").forEach((btn) => {
      btn.onclick = async () => {
        const [id, status] = btn.dataset.status.split(":");
        try {
          await adminApi(`/contratos/${id}`, { method: "PUT", body: { status } });
          carregarTabela();
        } catch (err) {
          alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        }
      };
    });
  }

  const formCard = document.getElementById("formCard");
  document.getElementById("btnNovo").onclick = () => {
    formCard.style.display = "block";
    formCard.scrollIntoView({ behavior: "smooth" });
  };
  document.getElementById("btnCancelar").onclick = () => {
    formCard.style.display = "none";
    document.getElementById("contratoForm").reset();
  };

  document.getElementById("contratoForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btnSalvar = document.getElementById("btnSalvar");
    btnSalvar.disabled = true;
    try {
      await adminApi("/contratos", {
        method: "POST",
        body: {
          clienteId: document.getElementById("clienteId").value,
          planoId: document.getElementById("planoId").value,
          valorImplantacao: parseFloat(document.getElementById("valorImplantacao").value || "0"),
          dataAssinatura: document.getElementById("dataAssinatura").value || undefined,
          dataInicio: document.getElementById("dataInicio").value || undefined,
          dataTermino: document.getElementById("dataTermino").value || undefined,
          diaVencimento: document.getElementById("diaVencimento").value || undefined,
        },
      });
      document.getElementById("contratoForm").reset();
      formCard.style.display = "none";
      alertBox.innerHTML = `<div class="alert alert-success">Contrato criado.</div>`;
      carregarTabela();
    } catch (err) {
      alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    } finally {
      btnSalvar.disabled = false;
    }
  });

  (async () => {
    try {
      await carregarSelects();
      await carregarTabela();
    } catch (err) {
      alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
  })();
</script>
</body>
</html>
