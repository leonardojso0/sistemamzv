<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contratos — NEXUS CONECTA</title>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<template id="page-body">
  <div class="page-header">
    <h2>Contratos</h2>
  </div>

  <p class="text-muted" style="margin-top:-0.5rem;">
    Consulta geral de todos os contratos. Para criar, alterar plano ou suspender/cancelar um contrato, acesse a página do cliente.
  </p>

  <div id="alertBox"></div>

  <div class="card">
    <div class="form-grid cols-2">
      <div class="field">
        <label>Buscar cliente</label>
        <input id="buscaCliente" placeholder="Digite o nome do cliente..." />
      </div>
      <div class="field">
        <label>Status</label>
        <select id="filtroStatus">
          <option value="">Todos</option>
          <option value="ATIVO">Ativo</option>
          <option value="SUSPENSO">Suspenso</option>
          <option value="CANCELADO">Cancelado</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card table-wrap">
    <table>
      <thead><tr><th>Cliente</th><th>Plano</th><th>Status</th><th>Vigência</th><th>Vencimento</th><th></th></tr></thead>
      <tbody id="tabelaContratos"><tr><td colspan="6">Carregando...</td></tr></tbody>
    </table>
  </div>
</template>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/admin-nav.js"></script>
<script>
  requireAdminAuth();
  renderAdminNav("contratos");

  const alertBox = document.getElementById("alertBox");
  let contratosCache = [];

  const badgeStatusContrato = (status) => {
    const mapa = { ATIVO: "badge-success", SUSPENSO: "badge-warning", CANCELADO: "badge-muted" };
    return `<span class="badge ${mapa[status] || "badge-muted"}">${status}</span>`;
  };

  function renderTabela() {
    const termo = document.getElementById("buscaCliente").value.trim().toLowerCase();
    const status = document.getElementById("filtroStatus").value;

    const contratos = contratosCache.filter((c) => {
      const bateNome = !termo || c.cliente.nome.toLowerCase().includes(termo);
      const bateStatus = !status || c.status === status;
      return bateNome && bateStatus;
    });

    const tbody = document.getElementById("tabelaContratos");
    tbody.innerHTML = contratos.length
      ? contratos
          .map(
            (c) => `
      <tr>
        <td data-label="Cliente"><a href="cliente-detalhe.html?id=${c.cliente.id}">${c.cliente.nome}</a></td>
        <td data-label="Plano">${c.plano.nome} (${c.plano.velocidade})</td>
        <td data-label="Status">${badgeStatusContrato(c.status)}</td>
        <td data-label="Vigência">${c.dataInicio ? formatData(c.dataInicio) : "-"} a ${c.dataTermino ? formatData(c.dataTermino) : "-"}</td>
        <td data-label="Vencimento">${c.diaVencimento ? `Dia ${c.diaVencimento}` : "-"}</td>
        <td data-label=""><a class="btn btn-ghost" href="cliente-detalhe.html?id=${c.cliente.id}">Ver cliente</a></td>
      </tr>`
          )
          .join("")
      : `<tr><td colspan="6"><div class="empty-state">Nenhum contrato encontrado.</div></td></tr>`;
  }

  async function carregarTabela() {
    contratosCache = await adminApi("/contratos");
    renderTabela();
  }

  document.getElementById("buscaCliente").addEventListener("input", renderTabela);
  document.getElementById("filtroStatus").addEventListener("change", renderTabela);

  carregarTabela().catch((err) => {
    alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
  });
</script>
</body>
</html>
