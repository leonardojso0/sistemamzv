<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Boletos — NEXUS CONECTA</title>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<template id="page-body">
  <div class="page-header">
    <h2>Enviar boleto</h2>
  </div>

  <div id="alertBox"></div>

  <div class="card">
    <form id="boletoForm" class="form-grid cols-2">
      <div class="field" style="grid-column: 1 / -1;">
        <label>Contrato</label>
        <select id="contratoId" required><option value="">Selecione...</option></select>
      </div>
      <div class="field"><label>Mês de referência</label><input id="mesReferencia" type="month" required /></div>
      <div class="field"><label>Valor (R$)</label><input id="valor" type="number" step="0.01" min="0" required /></div>
      <div class="field"><label>Vencimento</label><input id="vencimento" type="date" required /></div>
      <div class="field"><label>Arquivo do boleto (PDF)</label><input id="arquivo" type="file" accept="application/pdf,image/*" required /></div>
      <div class="field" style="grid-column: 1 / -1;">
        <button type="submit" class="btn btn-block" id="btnEnviar">Enviar boleto</button>
      </div>
    </form>
  </div>

  <div class="section-title">Boletos enviados recentemente</div>
  <div class="card table-wrap">
    <table>
      <thead><tr><th>Cliente</th><th>Mês</th><th>Valor</th><th>Vencimento</th><th>Status</th><th></th></tr></thead>
      <tbody id="tabelaBoletos"><tr><td colspan="6">Carregando...</td></tr></tbody>
    </table>
  </div>
</template>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/admin-nav.js"></script>
<script>
  requireAdminAuth();
  renderAdminNav("boletos");

  const alertBox = document.getElementById("alertBox");

  async function carregarContratos() {
    const contratos = await adminApi("/contratos");
    const select = document.getElementById("contratoId");
    contratos
      .filter((c) => c.status === "ATIVO")
      .forEach((c) =>
        select.insertAdjacentHTML(
          "beforeend",
          `<option value="${c.id}">${c.cliente.nome} — ${c.plano.nome} (${c.plano.velocidade})</option>`
        )
      );
  }

  async function carregarRecentes() {
    const contas = await adminApi("/contas-receber");
    const tbody = document.getElementById("tabelaBoletos");
    const recentes = contas.sort((a, b) => new Date(b.criadoEm) - new Date(a.criadoEm)).slice(0, 10);
    tbody.innerHTML = recentes.length
      ? recentes
          .map(
            (c) => `
      <tr>
        <td data-label="Cliente">${c.contrato?.cliente?.nome || "-"}</td>
        <td data-label="Mês">${mesReferenciaLegivel(c.mesReferencia)}</td>
        <td data-label="Valor">${formatMoeda(c.valor)}</td>
        <td data-label="Vencimento">${formatData(c.vencimento)}</td>
        <td data-label="Status">${badgeStatusConta(c.status)}</td>
        <td data-label=""><button class="btn btn-ghost" data-baixar-boleto="${c.boleto?.id}">Baixar</button></td>
      </tr>`
          )
          .join("")
      : `<tr><td colspan="6"><div class="empty-state">Nenhum boleto enviado ainda.</div></td></tr>`;

    document.querySelectorAll("[data-baixar-boleto]").forEach((btn) => {
      btn.onclick = async () => {
        btn.disabled = true;
        btn.textContent = "Gerando link...";
        try {
          const data = await adminApi(`/boletos/${btn.dataset.baixarBoleto}/download`);
          window.open(data.url, "_blank", "noopener");
        } catch (err) {
          alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        } finally {
          btn.disabled = false;
          btn.textContent = "Baixar";
        }
      };
    });
  }

  document.getElementById("boletoForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btnEnviar = document.getElementById("btnEnviar");
    const arquivo = document.getElementById("arquivo").files[0];
    if (!arquivo) return;

    const formData = new FormData();
    formData.append("contratoId", document.getElementById("contratoId").value);
    formData.append("mesReferencia", document.getElementById("mesReferencia").value);
    formData.append("valor", document.getElementById("valor").value);
    formData.append("vencimento", document.getElementById("vencimento").value);
    formData.append("arquivo", arquivo);

    btnEnviar.disabled = true;
    btnEnviar.textContent = "Enviando...";
    try {
      await adminApi("/boletos", { method: "POST", body: formData, isFormData: true });
      document.getElementById("boletoForm").reset();
      alertBox.innerHTML = `<div class="alert alert-success">Boleto enviado e conta a receber criada.</div>`;
      carregarRecentes();
    } catch (err) {
      alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    } finally {
      btnEnviar.disabled = false;
      btnEnviar.textContent = "Enviar boleto";
    }
  });

  (async () => {
    try {
      await carregarContratos();
      await carregarRecentes();
    } catch (err) {
      alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
  })();
</script>
</body>
</html>
