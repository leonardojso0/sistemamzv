<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Início — NEXUS CONECTA</title>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<template id="page-body">
  <div id="alertBox"></div>

  <div class="quick-actions">
    <div class="quick-action-card">
      <div class="quick-action-icon"></div>
      <h4>Novo cliente</h4>
      <p>Cadastre um cliente e gerencie documentos e contratos.</p>
      <a href="clientes.html">Cadastrar &rarr;</a>
    </div>
    <div class="quick-action-card">
      <div class="quick-action-icon"></div>
      <h4>Enviar boleto</h4>
      <p>Envie um boleto e gere a conta a receber automaticamente.</p>
      <a href="boletos.html">Enviar &rarr;</a>
    </div>
    <div class="quick-action-card">
      <div class="quick-action-icon"></div>
      <h4>Centro de custo</h4>
      <p>Organize clientes por unidade ou departamento.</p>
      <a href="centro-custo.html">Gerenciar &rarr;</a>
    </div>
    <div class="quick-action-card">
      <div class="quick-action-icon"></div>
      <h4>Contas a receber</h4>
      <p>Acompanhe pagamentos, atrasos e histórico.</p>
      <a href="contas-receber.html">Ver contas &rarr;</a>
    </div>
  </div>

  <div class="resumo-header">
    <h3 style="margin:0;">Resumo diário</h3>
    <button class="btn-toggle-valores" id="btnToggleValores">👁 Ocultar valores</button>
  </div>

  <div class="dark-cards">
    <div class="dark-card">
      <div class="dark-card-header">Contas a receber</div>
      <div class="dark-card-metric">
        <div class="label">Total em aberto</div>
        <div class="value valores" id="valorEmAberto">–</div>
      </div>
      <div class="dark-card-metric">
        <div class="label">Vencendo hoje</div>
        <div class="value valores" id="valorVencendoHoje" style="font-size:1rem;">–</div>
      </div>
    </div>
    <div class="dark-card">
      <div class="dark-card-header">Clientes e contratos</div>
      <div class="dark-card-metric">
        <div class="label">Clientes ativos</div>
        <div class="value valores" id="statClientes">–</div>
      </div>
      <div class="dark-card-metric">
        <div class="label">Contratos ativos</div>
        <div class="value valores" id="statContratos" style="font-size:1rem;">–</div>
      </div>
    </div>
  </div>

  <div class="section-title">Contas a vencer em breve</div>
  <div class="card table-wrap">
    <table>
      <thead>
        <tr><th>Cliente</th><th>Mês</th><th>Valor</th><th>Vencimento</th><th>Status</th></tr>
      </thead>
      <tbody id="tabelaContas">
        <tr><td colspan="5">Carregando...</td></tr>
      </tbody>
    </table>
  </div>
</template>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/admin-nav.js"></script>
<script>
  requireAdminAuth();
  renderAdminNav("dashboard");

  document.querySelectorAll(".quick-action-icon").forEach((el, i) => {
    const chaves = ["clientes", "boletos", "centro-custo", "contas"];
    el.innerHTML = iconeNav(chaves[i]);
  });

  let valoresOcultos = false;
  document.getElementById("btnToggleValores").onclick = () => {
    valoresOcultos = !valoresOcultos;
    document.querySelectorAll(".valores").forEach((el) => el.classList.toggle("valor-oculto", valoresOcultos));
    document.getElementById("btnToggleValores").textContent = valoresOcultos ? "👁 Mostrar valores" : "👁 Ocultar valores";
  };

  async function carregar() {
    const alertBox = document.getElementById("alertBox");
    try {
      const [clientes, contratos, contas] = await Promise.all([
        adminApi("/clientes"),
        adminApi("/contratos"),
        adminApi("/contas-receber"),
      ]);

      document.getElementById("statClientes").textContent = clientes.filter((c) => c.status === "ATIVO").length;
      document.getElementById("statContratos").textContent = contratos.filter((c) => c.status === "ATIVO").length;

      const emAberto = contas.filter((c) => c.status !== "PAGO");
      const totalEmAberto = emAberto.reduce((soma, c) => soma + Number(c.valor), 0);

      const hojeStr = new Date().toISOString().slice(0, 10);
      const vencendoHoje = emAberto.filter((c) => new Date(c.vencimento).toISOString().slice(0, 10) === hojeStr);
      const totalVencendoHoje = vencendoHoje.reduce((soma, c) => soma + Number(c.valor), 0);

      document.getElementById("valorEmAberto").textContent = formatMoeda(totalEmAberto);
      document.getElementById("valorVencendoHoje").textContent =
        vencendoHoje.length > 0 ? `${formatMoeda(totalVencendoHoje)} (${vencendoHoje.length})` : "Nenhum vencimento hoje";

      const pendentes = emAberto.sort((a, b) => new Date(a.vencimento) - new Date(b.vencimento)).slice(0, 8);

      const tbody = document.getElementById("tabelaContas");
      if (pendentes.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">Nenhuma conta pendente.</div></td></tr>`;
        return;
      }

      tbody.innerHTML = pendentes
        .map(
          (c) => `
        <tr>
          <td data-label="Cliente">${c.contrato?.cliente?.nome || "-"}</td>
          <td data-label="Mês">${mesReferenciaLegivel(c.mesReferencia)}</td>
          <td data-label="Valor">${formatMoeda(c.valor)}</td>
          <td data-label="Vencimento">${formatData(c.vencimento)}</td>
          <td data-label="Status">${badgeStatusConta(c.status)}</td>
        </tr>
      `
        )
        .join("");
    } catch (err) {
      alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
  }

  carregar();
</script>
</body>
</html>
