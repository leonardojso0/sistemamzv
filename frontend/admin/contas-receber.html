<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contas a Receber — NEXUS CONECTA</title>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<template id="page-body">
  <div class="page-header">
    <h2>Contas a receber</h2>
  </div>

  <div id="alertBox"></div>

  <div class="card">
    <div class="form-grid cols-3">
      <div class="field">
        <label>Status</label>
        <select id="filtroStatus">
          <option value="">Todos</option>
          <option value="PENDENTE">Pendente</option>
          <option value="ATRASADO">Atrasado</option>
          <option value="PAGO">Pago</option>
        </select>
      </div>
      <div class="field">
        <label>Vencimento a partir de</label>
        <input type="date" id="filtroDataInicio" />
      </div>
      <div class="field">
        <label>Vencimento até</label>
        <input type="date" id="filtroDataFim" />
      </div>
      <div class="field">
        <label>Centro de custo</label>
        <select id="filtroCentroCusto"><option value="">Todos</option></select>
      </div>
    </div>
    <div class="flex-between">
      <button class="btn btn-ghost" id="btnLimparFiltros">Limpar filtros</button>
      <div style="display:flex; gap:0.5rem;">
        <button class="btn btn-ghost" id="btnExportarExcel">Exportar Excel</button>
        <button class="btn btn-ghost" id="btnExportarPdf">Exportar PDF</button>
        <button class="btn" id="btnFiltrar">Filtrar</button>
      </div>
    </div>
  </div>

  <div class="card table-wrap">
    <table>
      <thead>
        <tr><th>Status</th><th>Cliente</th><th>Histórico</th><th>Competência</th><th>Vencimento</th><th>Valor</th><th></th></tr>
        <tr class="col-filter-row">
          <td></td>
          <td><input class="col-filter" data-coluna="cliente" placeholder="🔍 Filtrar..." /></td>
          <td><input class="col-filter" data-coluna="historico" placeholder="🔍 Filtrar..." /></td>
          <td><input class="col-filter" data-coluna="competencia" placeholder="🔍 Filtrar..." /></td>
          <td><input class="col-filter" data-coluna="vencimento" placeholder="🔍 Filtrar..." /></td>
          <td><input class="col-filter" data-coluna="valor" placeholder="🔍 Filtrar..." /></td>
          <td></td>
        </tr>
      </thead>
      <tbody id="tabelaContas"><tr><td colspan="7">Carregando...</td></tr></tbody>
    </table>
  </div>
</template>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal-card">
    <div class="flex-between" style="margin-bottom: 0.25rem;">
      <h3 id="modalTitulo" style="margin:0;">Lançamento</h3>
      <button class="modal-close" id="modalFechar">&times;</button>
    </div>
    <div class="text-muted" id="modalUltimaAtualizacao" style="margin-bottom: 1rem; font-size: 0.82rem;"></div>

    <div id="modalAlert"></div>
    <div id="modalDetalhe" class="text-muted">Carregando...</div>

    <div class="section-title">Editar lançamento</div>
    <div class="card" id="modalEditar"></div>

    <div class="section-title">Ações</div>
    <div class="card" id="modalAcoes"></div>

    <div class="section-title">Histórico de movimentações</div>
    <ul class="timeline" id="modalHistorico"><li>Carregando...</li></ul>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/admin-nav.js"></script>
<script>
  requireAdminAuth();
  renderAdminNav("contas");

  const alertBox = document.getElementById("alertBox");
  const modalOverlay = document.getElementById("modalOverlay");
  let contasCache = [];

  function fecharModal() {
    modalOverlay.classList.add("hidden");
  }
  document.getElementById("modalFechar").onclick = fecharModal;
  modalOverlay.addEventListener("click", (e) => {
    if (e.target === modalOverlay) fecharModal();
  });

  function competenciaLegivel(mes) {
    if (!mes) return "-";
    const [ano, mesNum] = mes.split("-");
    return `${mesNum}/${ano}`;
  }

  function historicoBase(c) {
    return c.descricao || `Mensalidade ${c.contrato?.plano?.nome || ""} — ${mesReferenciaLegivel(c.mesReferencia)}`;
  }

  function historicoTexto(c) {
    const base = historicoBase(c);
    const centro = c.contrato?.cliente?.centroCusto;
    return centro ? `${base} · ${centro.nome}` : base;
  }

  function badgeSituacao(conta) {
    if (conta.status === "PAGO") return '<span class="badge badge-success">Pago</span>';
    const hoje = new Date().toISOString().slice(0, 10);
    const vencimento = new Date(conta.vencimento).toISOString().slice(0, 10);
    if (vencimento < hoje) return '<span class="badge badge-danger">Vencido</span>';
    return '<span class="badge badge-muted">A vencer</span>';
  }

  function montarQuery() {
    const params = new URLSearchParams();
    const status = document.getElementById("filtroStatus").value;
    const dataInicio = document.getElementById("filtroDataInicio").value;
    const dataFim = document.getElementById("filtroDataFim").value;
    const centroCustoId = document.getElementById("filtroCentroCusto").value;
    if (status) params.set("status", status);
    if (dataInicio) params.set("dataInicio", dataInicio);
    if (dataFim) params.set("dataFim", dataFim);
    if (centroCustoId) params.set("centroCustoId", centroCustoId);
    const qs = params.toString();
    return qs ? `?${qs}` : "";
  }

  async function carregarCentrosCusto() {
    const centros = await adminApi("/centro-custo");
    const select = document.getElementById("filtroCentroCusto");
    centros.forEach((c) => select.insertAdjacentHTML("beforeend", `<option value="${c.id}">${c.nome} (${c.numero})</option>`));
  }

  function renderTabela() {
    const filtroCliente = document.querySelector('[data-coluna="cliente"]').value.trim().toLowerCase();
    const filtroHistorico = document.querySelector('[data-coluna="historico"]').value.trim().toLowerCase();
    const filtroCompetencia = document.querySelector('[data-coluna="competencia"]').value.trim().toLowerCase();
    const filtroVencimento = document.querySelector('[data-coluna="vencimento"]').value.trim().toLowerCase();
    const filtroValor = document.querySelector('[data-coluna="valor"]').value.trim().toLowerCase();

    const contas = contasCache.filter((c) => {
      const nomeCliente = (c.contrato?.cliente?.nome || "").toLowerCase();
      const historico = historicoTexto(c).toLowerCase();
      const competencia = competenciaLegivel(c.mesReferencia).toLowerCase();
      const vencimento = formatData(c.vencimento).toLowerCase();
      const valor = formatMoeda(c.valor).toLowerCase();
      return (
        (!filtroCliente || nomeCliente.includes(filtroCliente)) &&
        (!filtroHistorico || historico.includes(filtroHistorico)) &&
        (!filtroCompetencia || competencia.includes(filtroCompetencia)) &&
        (!filtroVencimento || vencimento.includes(filtroVencimento)) &&
        (!filtroValor || valor.includes(filtroValor))
      );
    });

    const tbody = document.getElementById("tabelaContas");
    tbody.innerHTML = contas.length
      ? contas
          .map(
            (c) => `
      <tr>
        <td data-label="Status">${badgeSituacao(c)}</td>
        <td data-label="Cliente">${c.contrato?.cliente?.nome || "-"}</td>
        <td data-label="Histórico">${historicoTexto(c)}</td>
        <td data-label="Competência">${competenciaLegivel(c.mesReferencia)}</td>
        <td data-label="Vencimento">${formatData(c.vencimento)}</td>
        <td data-label="Valor">${formatMoeda(c.valor)}</td>
        <td data-label="">
          <details class="row-actions">
            <summary class="btn btn-ghost">Ações</summary>
            <div class="row-actions-menu">
              <button type="button" data-abrir="${c.id}">Ver detalhe</button>
              ${c.status !== "PAGO" ? `<button type="button" data-pagar-rapido="${c.id}">Marcar como pago</button>` : ""}
            </div>
          </details>
        </td>
      </tr>`
          )
          .join("")
      : `<tr><td colspan="7"><div class="empty-state">Nenhuma conta encontrada.</div></td></tr>`;

    document.querySelectorAll("[data-abrir]").forEach((btn) => {
      btn.onclick = (e) => {
        e.target.closest("details").open = false;
        abrirModal(btn.dataset.abrir);
      };
    });

    document.querySelectorAll("[data-pagar-rapido]").forEach((btn) => {
      btn.onclick = async (e) => {
        e.target.closest("details").open = false;
        try {
          await adminApi(`/contas-receber/${btn.dataset.pagarRapido}/pagar`, { method: "PATCH" });
          carregar();
        } catch (err) {
          alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        }
      };
    });
  }

  async function carregar() {
    contasCache = await adminApi(`/contas-receber${montarQuery()}`);
    renderTabela();
  }

  document.querySelectorAll(".col-filter").forEach((input) => {
    input.addEventListener("input", renderTabela);
  });

  async function abrirModal(id) {
    modalOverlay.classList.remove("hidden");
    document.getElementById("modalAlert").innerHTML = "";
    document.getElementById("modalDetalhe").textContent = "Carregando...";
    document.getElementById("modalAcoes").innerHTML = "";
    document.getElementById("modalHistorico").innerHTML = "<li>Carregando...</li>";

    try {
      const [conta, historico] = await Promise.all([
        adminApi(`/contas-receber/${id}`),
        adminApi(`/contas-receber/${id}/historico`),
      ]);

      document.getElementById("modalTitulo").textContent = conta.contrato?.cliente?.nome || "Lançamento";
      document.getElementById("modalUltimaAtualizacao").textContent = historico.length
        ? `Última atualização: ${historico[0].realizadoPor?.nome || "Sistema"} em ${new Date(historico[0].criadoEm).toLocaleString("pt-BR")}`
        : "";

      document.getElementById("modalDetalhe").innerHTML = `
        <div class="form-grid cols-2">
          <div><strong>Histórico:</strong> ${historicoTexto(conta)}</div>
          <div><strong>Centro de custo:</strong> ${conta.contrato?.cliente?.centroCusto ? `${conta.contrato.cliente.centroCusto.nome} (${conta.contrato.cliente.centroCusto.numero})` : "-"}</div>
          <div><strong>Status:</strong> ${badgeSituacao(conta)}</div>
          <div><strong>Data de pagamento:</strong> ${conta.dataPagamento ? formatData(conta.dataPagamento) : "-"}</div>
          <div><strong>Confirmado por:</strong> ${conta.confirmadoPor?.nome || "-"}</div>
        </div>
      `;

      const editar = document.getElementById("modalEditar");
      editar.innerHTML = `
        <form id="formEditarLancamento" class="form-grid cols-2">
          <div class="field" style="grid-column: 1 / -1;">
            <label>Histórico</label>
            <input id="editHistorico" value="${historicoBase(conta).replace(/"/g, "&quot;")}" />
          </div>
          <div class="field">
            <label>Competência</label>
            <input type="month" id="editCompetencia" value="${conta.mesReferencia}" />
          </div>
          <div class="field">
            <label>Vencimento</label>
            <input type="date" id="editVencimento" value="${new Date(conta.vencimento).toISOString().slice(0, 10)}" />
          </div>
          <div class="field" style="grid-column: 1 / -1;">
            <label>Valor (R$)</label>
            <input type="number" step="0.01" min="0" id="editValor" value="${Number(conta.valor)}" />
          </div>
          <div class="field" style="grid-column: 1 / -1;">
            <button type="submit" class="btn btn-block" id="btnSalvarEdicaoLancamento">Salvar alterações</button>
          </div>
        </form>
      `;

      document.getElementById("formEditarLancamento").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnSalvarEdicaoLancamento");
        btn.disabled = true;
        try {
          await adminApi(`/contas-receber/${id}/detalhes`, {
            method: "PATCH",
            body: {
              descricao: document.getElementById("editHistorico").value.trim(),
              mesReferencia: document.getElementById("editCompetencia").value,
              vencimento: document.getElementById("editVencimento").value,
              valor: parseFloat(document.getElementById("editValor").value),
            },
          });
          await abrirModal(id);
          carregar();
        } catch (err) {
          document.getElementById("modalAlert").innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        } finally {
          btn.disabled = false;
        }
      });

      const acoes = document.getElementById("modalAcoes");
      acoes.innerHTML = `
        <div class="form-grid cols-2">
          <div class="field">
            <label>${conta.status === "PAGO" ? "Corrigir data de pagamento" : "Marcar como pago em"}</label>
            <input type="date" id="inputDataPagamento" value="${conta.dataPagamento ? new Date(conta.dataPagamento).toISOString().slice(0, 10) : ""}" />
          </div>
          <div class="field" style="display:flex; align-items:flex-end; gap:0.5rem;">
            <button class="btn btn-block" id="btnConfirmarPagamento">
              ${conta.status === "PAGO" ? "Salvar nova data" : "Confirmar pagamento"}
            </button>
          </div>
        </div>
        ${
          conta.status === "PAGO"
            ? '<button class="btn btn-ghost btn-block" id="btnReabrir">Reabrir lançamento (desfazer pagamento)</button>'
            : ""
        }
      `;

      document.getElementById("btnConfirmarPagamento").onclick = async () => {
        const dataPagamento = document.getElementById("inputDataPagamento").value;
        if (!dataPagamento) {
          document.getElementById("modalAlert").innerHTML = `<div class="alert alert-error">Selecione uma data.</div>`;
          return;
        }
        try {
          if (conta.status === "PAGO") {
            await adminApi(`/contas-receber/${id}/data-pagamento`, { method: "PATCH", body: { dataPagamento } });
          } else {
            await adminApi(`/contas-receber/${id}/pagar`, { method: "PATCH", body: { dataPagamento } });
          }
          await abrirModal(id);
          carregar();
        } catch (err) {
          document.getElementById("modalAlert").innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        }
      };

      const btnReabrir = document.getElementById("btnReabrir");
      if (btnReabrir) {
        btnReabrir.onclick = async () => {
          if (!confirm("Reabrir este lançamento? Ele voltará para pendente.")) return;
          try {
            await adminApi(`/contas-receber/${id}/reabrir`, { method: "PATCH" });
            await abrirModal(id);
            carregar();
          } catch (err) {
            document.getElementById("modalAlert").innerHTML = `<div class="alert alert-error">${err.message}</div>`;
          }
        };
      }

      const listaHistorico = document.getElementById("modalHistorico");
      listaHistorico.innerHTML = historico.length
        ? historico
            .map(
              (h) => `
        <li>
          ${h.descricao}
          <div class="timeline-meta">${new Date(h.criadoEm).toLocaleString("pt-BR")} — ${h.realizadoPor?.nome || "Sistema"}</div>
        </li>`
            )
            .join("")
        : "<li>Nenhuma movimentação registrada ainda.</li>";
    } catch (err) {
      document.getElementById("modalDetalhe").innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
  }

  document.getElementById("btnFiltrar").onclick = () => carregar().catch((err) => {
    alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
  });

  async function exportar(botaoId, caminho) {
    const btn = document.getElementById(botaoId);
    const textoOriginal = btn.textContent;
    btn.disabled = true;
    btn.textContent = "Gerando...";
    try {
      await baixarArquivoAdmin(`${caminho}${montarQuery()}`);
    } catch (err) {
      alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = textoOriginal;
    }
  }

  document.getElementById("btnExportarExcel").onclick = () => exportar("btnExportarExcel", "/contas-receber/exportar/excel");
  document.getElementById("btnExportarPdf").onclick = () => exportar("btnExportarPdf", "/contas-receber/exportar/pdf");

  document.getElementById("btnLimparFiltros").onclick = () => {
    document.getElementById("filtroStatus").value = "";
    document.getElementById("filtroDataInicio").value = "";
    document.getElementById("filtroDataFim").value = "";
    document.getElementById("filtroCentroCusto").value = "";
    document.querySelectorAll(".col-filter").forEach((input) => (input.value = ""));
    carregar();
  };

  carregarCentrosCusto().catch(() => {});
  carregar().catch((err) => {
    alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
  });
</script>
</body>
</html>
